# ci pipeline — makes sure nothing is bricked before we merge no cap 🔥
name: ci

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: linux
    steps:
      - name: yoink the code 📥
        uses: actions/checkout@v4

      - name: install the litty CLI for fire CI output 🔥
        run: |
          go install ./cmd/litty
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: build — make sure it compiles bestie 🏗️🔥
        run: litty build ./...

      - name: vet — lint the vibes 🔍
        run: litty vet ./...

      - name: test — check all the vibes 🧪🔥
        run: litty test -race -count=1 ./...
